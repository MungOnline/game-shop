services:
  - type: web
    name: gamecodeshop
    runtime: node
    repo: https://github.com/YOUR_USERNAME/game-shop
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        sync: false
    buildCommand: npm install
    startCommand: npm start
